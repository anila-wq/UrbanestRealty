
  <!DOCTYPE html>
  <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Urbanest Realty | Luxury Apartments & Plots in East Bangalore</title>
    </head>

    <body>

<div id="root"></div>

<script>
  // Get the current path (e.g., /sereneexotica/ or /eastfield/)
  const path = window.location.pathname;

  // Check if the path STARTS with the microsite folder names
  const isMicrosite = path.startsWith('/sereneexotica') || path.startsWith('/eastfield');

  // If it's NOT a microsite path, load the main application's script
  if (!isMicrosite) {
    // This is the main application's entry script
    const script = document.createElement('script');
    script.type = 'module';
    // ⚠️ ENSURE this path is correct for your main app's entry script (e.g., /src/main.jsx)
    script.src = '/src/main.jsx'; 
    document.body.appendChild(script);
  }
  // If isMicrosite is true, no script runs, allowing the index.html inside
  // /sereneexotica/ or /eastfield/ to take control when served by the server.
</script>

    </body>
  </html>
